<script>


/* ORIGINAL CODE */

let symbols=[];
let highRvolSymbols={};
let widget=null;
let selectedSymbol=null;
let lastClickedSymbol="";
let selectedIndex = -1;
let sortedKeys = [];
let currentTheme="light";
let contextSymbol=null;
let isMasterScanner=false;
let wakeLock=null;
let isDragging = false;
let animationFrameId = null;
let lastPercent = 13;

let settings={
sound:true,
minRvol:15,
minValueCr:0.00,
positionUSD:5.5,
rowHeight:30,
swapLayout:false,
timeframe:"15",
theme:"light",
rvolTf:"15m",
avgCandles:300,
breakoutCandles:0
};
	
let favorites = [];
let lastSoundTime = 0;
let scannerRunning = true;
let specialScannerRunning = true;

let ignoreList = JSON.parse(localStorage.getItem("ignoreList") || "{}");


// ===== BINANCE LIST MODE =====
let binanceList = [];
let currentMode = "main"; // main / binance


// ===== SPECIAL SCAN =====
let specialSymbols = JSON.parse(localStorage.getItem("specialScanSymbols") || "{}");
let specialScanInterval = null;
let specialLastSound = {};

// ===== SPECIAL SCAN STORAGE =====

let specialScanState = {
currentIndex:0,
lastAlert:{}
};

async function enableWakeLock(){

try{

wakeLock = await navigator.wakeLock.request('screen');

console.log("Wake Lock Active");

wakeLock.addEventListener("release", () => {

console.log("Wake Lock released");

if(isMasterScanner){
enableWakeLock();
}

});

}catch(err){

console.log("Wake Lock Failed", err);

}

}
function saveList(){
localStorage.setItem("scannerSignals", JSON.stringify(highRvolSymbols));
}

async function loadList(){

// CLEAN EXPIRED IGNORE SYMBOLS
const now = Date.now();
for(let s in ignoreList){
if(ignoreList[s] < now){
delete ignoreList[s];
}
}
localStorage.setItem("ignoreList", JSON.stringify(ignoreList));

// LOAD FAVORITES LOCAL
favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

// LOAD SCANNER DATA LOCAL
const saved = localStorage.getItem("scannerSignals");
if(saved){
highRvolSymbols = JSON.parse(saved);
}

// LOAD SPECIAL SCAN SYMBOLS
const specialSaved = localStorage.getItem("specialScanSymbols");
if(specialSaved){
specialSymbols = JSON.parse(specialSaved);
}

render();

const s = localStorage.getItem("rvolBreakoutSettings");

if(s){
try{
settings = {...settings, ...JSON.parse(s)};
}catch(e){
console.log("Settings load error",e);
}
}

}

function saveSettings(){
localStorage.setItem("rvolBreakoutSettings", JSON.stringify(settings));
}

function formatTime(ts){
const d = new Date(ts);

const hours = String(d.getHours()).padStart(2,'0');
const mins = String(d.getMinutes()).padStart(2,'0');

return `${hours}:${mins}`;
}

// ===== BINANCE LIST LOAD =====
async function loadBinanceList(){
try{

const res = await fetch("https://fapi.binance.com/fapi/v1/ticker/24hr");
const data = await res.json();

binanceList = data
.filter(d => d.symbol.endsWith("USDT"))
.map(d => ({
symbol: d.symbol,
change: parseFloat(d.priceChangePercent).toFixed(2)
}));

console.log("Binance List Loaded:", binanceList.length);

}catch(e){
console.log("Binance List Error:", e);
}
}

	
document.getElementById("resetBtn").onclick = ()=>{

if(!confirm("FULL RESET? All scanner memory will be cleared.")) return;

hideMenu();
document.getElementById("settingsPopup").style.display = "none";
document.getElementById("specialPopup").style.display = "none";
document.getElementById("specialHitPopup").style.display = "none";


// 🔥 STOP LOOPS
scannerRunning = false;
specialScannerRunning = false;

// 🔥 CLEAR ALL RUNTIME DATA
highRvolSymbols = {};
specialSymbols = {};
favorites = [];
ignoreList = {};
binanceList = [];
specialLastSound = {};
selectedSymbol = null;
contextSymbol = null;
lastClickedSymbol = "";

// 🔥 RESET SPECIAL STATE
specialScanState = {
currentIndex:0,
lastAlert:{}
};

// 🔥 CLEAR STORAGE
localStorage.clear();

// 🔥 stop loops first
scannerRunning = false;
specialScannerRunning = false;

// 🔥 CLEAR TABLE UI
document.getElementById("body").innerHTML = "";

// 🔥 RESET CHART
if(widget){
try{ widget.remove(); }catch(e){}
document.getElementById("chart").innerHTML = "";
}

// 🔥 RESTART ENGINE CLEANLY
setTimeout(()=>{

scannerRunning = true;
specialScannerRunning = true;

scannerLoop();
specialScanLoop();

// 🔥 FINAL STEP: reload after everything
location.reload();

}, 1000);

// 🔥 REFRESH SYMBOL LIST
fetchSymbols().then(()=>{
render();
});

};

async function fetchSymbols(){

const res=await fetch("https://fapi.binance.com/fapi/v1/exchangeInfo");
const data=await res.json();

symbols=data.symbols
.filter(s=>
s.contractType==="PERPETUAL" &&
s.quoteAsset==="USDT" &&
s.status==="TRADING"
)
.map(s=>s.symbol)

}

async function fetchLivePrice(symbol){
try{
const res = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${symbol}`);
const data = await res.json();
return parseFloat(data.price);
}catch{
return null;
}
}

async function fetchWithTimeout(url, timeout=10000){

return Promise.race([

fetch(url),

new Promise((_,reject)=>
setTimeout(()=>reject(new Error("timeout")),timeout)
)

]);

}

async function getRVOLData(symbol){
try{

let tf = settings.rvolTf ?? "15m";

let avgLen = settings.avgCandles ?? 200;
let breakoutLen = settings.breakoutCandles ?? 0;

let maxLen = Math.max(avgLen, breakoutLen);

let limit = maxLen + 2;

const res=await fetchWithTimeout(
`https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${tf}&limit=${limit}`,10000);

const data=await res.json();
if(!Array.isArray(data)) return null;

// 🔒 DATA LENGTH SAFETY
if(data.length < limit){
return null;
}

// 200 candles avg

let vols=data.slice(0,avgLen).map(x=>parseFloat(x[5]));
let avg=vols.reduce((a,b)=>a+b,0)/avgLen;


if(!data[avgLen] || !data[avgLen+1]) return null;

let closed = data[avgLen];
let live = data[avgLen+1];

let closedVol=parseFloat(closed[5]);
let liveVol=parseFloat(live[5]);

// 🔥 HIGH VALUES
let closedHigh=parseFloat(closed[2]);
let liveHigh=parseFloat(live[2]);

// 🔥 BREAKOUT RANGE
let breakoutPass = true;

if(breakoutLen > 0){

let startIndex = data.length - breakoutLen - 2;

let highs = data.slice(startIndex, data.length - 2).map(x=>parseFloat(x[2]));

let highestHigh = -Infinity;

for(let h of highs){
if(h > highestHigh) highestHigh = h;
}

breakoutPass = (closedHigh > highestHigh || liveHigh > highestHigh);

}

let rvol_closed = closedVol / avg;
let rvol_live = liveVol / avg;

let minR = settings.minRvol ?? 15;

let price = parseFloat(live[4]);
let volUsed = Math.max(liveVol, closedVol);
let valueCr = (price * volUsed) / 10000000;
let minValue = settings.minValueCr ?? 0.00;

// OR condition
let rvolPass = (rvol_closed >= minR || rvol_live >= minR);

if(rvolPass && breakoutPass && valueCr >= minValue){

// return jo pass kare
if(rvol_live >= minR){
return {r: Math.floor(rvol_live), value:valueCr};
}else{
return {r: Math.floor(rvol_closed), value:valueCr};
}

}

return null;

}catch{
return null;
}
}

async function scan(){

document.getElementById("updateText").innerText="Scanning...";

const batchSize=50;
const delay=8000;

for(let i=0;i<symbols.length;i+=batchSize){

document.getElementById("updateText").innerText =
"" + i + " / " + symbols.length;

let batch=symbols.slice(i,i+batchSize);

let promises=batch.map(s=>getRVOLData(s).then(res=>res ? {s,...res} : null));

let results=await Promise.all(promises);

for(let item of results){

if(item && item.r){

if(ignoreList[item.s]){
if(ignoreList[item.s] > Date.now()){
continue; 
}else{
delete ignoreList[item.s];
localStorage.setItem("ignoreList", JSON.stringify(ignoreList));
}
}

// 🚫 SKIP if in special scan
if(specialSymbols[item.s]){
continue;
}

if(highRvolSymbols[item.s]){
continue;
}

if(settings.sound){

let now = Date.now();
if(now - lastSoundTime > 2000){
const sound=document.getElementById("alertSound");
sound.currentTime=0;
sound.play();
lastSoundTime = now;
}

}


highRvolSymbols = {
[item.s]:{
time:Date.now(),
rvol: item.r,
value: item.value
},
...highRvolSymbols
};

saveList();
render();

}
}

if(i+batchSize<symbols.length){
await new Promise(r=>setTimeout(r,delay));
}

}

document.getElementById("updateText").innerText=
"Done: "+new Date().toLocaleTimeString();

}

let sortDirection = -1; // newest first default
let currentSort = "time";

let binanceSortDirection = -1; // NEW


function sortList(type){

currentSort = type;

let entries = Object.entries(highRvolSymbols);

if(type==="symbol"){
entries.sort((a,b)=>a[0].localeCompare(b[0]) * sortDirection);
}

if(type==="time"){
entries.sort((a,b)=>(a[1].time - b[1].time) * sortDirection);
}

if(type==="rvol"){
entries.sort((a,b)=>(a[1].rvol - b[1].rvol) * sortDirection);
}

if(type==="value"){
entries.sort((a,b)=>(a[1].value - b[1].value) * sortDirection);
}
sortDirection *= -1;

highRvolSymbols = Object.fromEntries(entries);

render();

}

// ===== BINANCE SORT =====
function sortBinance(type){

if(type === "symbol"){
binanceList.sort((a,b)=>
a.symbol.localeCompare(b.symbol) * binanceSortDirection
);
}

if(type === "change"){
binanceList.sort((a,b)=>
(parseFloat(a.change) - parseFloat(b.change)) * binanceSortDirection
);
}

binanceSortDirection *= -1;

// 🔥 selectedIndex FIX after sort
let keys = binanceList.map(d => d.symbol);
selectedIndex = keys.indexOf(selectedSymbol);
if(selectedIndex < 0) selectedIndex = 0;

render();
}

function render(){

const tbody=document.getElementById("body");
const thead = document.querySelector("thead"); // NEW

tbody.innerHTML="";

// ===== BINANCE MODE =====
if(currentMode === "binance"){

// sync selectedIndex
let keys = binanceList.map(d => d.symbol);
selectedIndex = keys.indexOf(selectedSymbol);
if(selectedIndex < 0) selectedIndex = 0;

thead.innerHTML = `
<tr>
<th style="width:50%" onclick="sortBinance('symbol')">Symbol</th>
<th style="width:50%" onclick="sortBinance('change')">Change %</th>
</tr>
`;

binanceList.forEach((d,index)=>{
let row = document.createElement("tr");
const rowHeight = settings.rowHeight || 30;
row.style.height = rowHeight + "px";
row.style.fontSize = "12px";
row.style.userSelect = "none";

row.dataset.symbol = d.symbol;

// highlight selected
if(selectedSymbol === d.symbol){
row.classList.add("selected");
}

row.innerHTML = `
<td>${d.symbol}</td>
<td>${d.change}%</td>
`;

// CLICK → chart open
row.onclick = ()=>{

selectedSymbol = d.symbol;
lastClickedSymbol = d.symbol;
selectedIndex = index;

const menuWidth = menu.offsetWidth;
const menuHeight = menu.offsetHeight;

const screenWidth = window.innerWidth;
const screenHeight = window.innerHeight;

let left = e.clientX;
let top = e.clientY;

if(left + menuWidth > screenWidth){
left = screenWidth - menuWidth - 5;

top = screenHeight - menuHeight - 5;
}

}

function initResize(){

const divider = document.getElementById("divider");
const left = document.querySelector(".left");

// load saved width
const savedWidth = localStorage.getItem("leftWidthPercent");
if(savedWidth){
left.style.width = savedWidth + "%";
}


divider.addEventListener("touchstart", ()=>{
isDragging = true;
divider.classList.add("active");
});

document.addEventListener("touchmove",(e)=>{
if(!isDragging) return;

e.preventDefault();

let touch = e.touches[0];

if(settings.swapLayout){
lastPercent = ((window.innerWidth - touch.clientX) / window.innerWidth) * 100;
}else{
lastPercent = (touch.clientX / window.innerWidth) * 100;
}


if(lastPercent < 8) lastPercent = 8;
if(lastPercent > 50) lastPercent = 50;

if(!animationFrameId){
animationFrameId = requestAnimationFrame(()=>{
left.style.width = lastPercent + "%";
animationFrameId = null;
});
}
});

// 📱 TOUCH END
document.addEventListener("touchend", ()=>{
if(isDragging){
localStorage.setItem("leftWidthPercent", lastPercent);
}

isDragging = false;
divider.classList.remove("active");
});

divider.addEventListener("mousedown", ()=>{
isDragging = true;
divider.classList.add("active");
});

// mouse move
document.addEventListener("mousemove",(e)=>{
if(!isDragging) return;

if(settings.swapLayout){
lastPercent = ((window.innerWidth - e.clientX) / window.innerWidth) * 100;
}else{
lastPercent = (e.clientX / window.innerWidth) * 100;
}

// limit
if(lastPercent < 8) lastPercent = 8;
if(lastPercent > 50) lastPercent = 50;

// animation frame for smooth update
if(!animationFrameId){
animationFrameId = requestAnimationFrame(()=>{

left.style.width = lastPercent + "%";

animationFrameId = null;

});
}
});

document.addEventListener("mouseup", ()=>{
if(isDragging){

localStorage.setItem("leftWidthPercent", lastPercent);

}

isDragging = false;
divider.classList.remove("active");
});

}

async function specialScanLoop(){
while(specialScannerRunning){

let keys = Object.keys(specialSymbols);

for(let s of keys){

try{

let setting = specialSymbols[s];   // ✅ पहले define करो

if(!setting) continue;             // ✅ safety

let tf = setting.tf || "1m";       // ✅ अब सही

let url = `https://fapi.binance.com/fapi/v1/klines?symbol=${s}&interval=${tf}&limit=2`;

let res = await fetch(url);
let data = await res.json();

if(!Array.isArray(data)) continue;

let closedVol = parseFloat(data[0][5]);
let liveVol = parseFloat(data[1][5]);

let maxVol = Math.max(closedVol, liveVol);

// 🚫 safety check
if(!setting || !setting.volume) continue;

// 🔥 FIX: skip first few seconds after adding symbol
if(setting.createdAt && (Date.now() - setting.createdAt < 3000)){
continue;
}

if(setting.volume && maxVol >= setting.volume){

// पहली बार hit
if(!setting.hit){

specialSymbols[s].hit = true;

let row = document.querySelector(`tr[data-symbol='${s}']`);
if(row){
row.classList.add("specialHit");
}

// 🔥 CHART AUTO OPEN
selectedSymbol = s;
lastClickedSymbol = s;
changeChartSymbol(s);

// 🔥 POPUP SHOW
const popup = document.getElementById("specialHitPopup");
const text = document.getElementById("specialHitText");

if(popup && text){
text.innerText = s + " HIT 🚀";
popup.style.display = "block";
}

}

// 🔔 SOUND ONLY WHEN CONDITION TRUE
let now = Date.now();

// 🔔 SOUND ONLY FIRST TIME WHEN HIT
if(setting.hit && !specialLastSound[s]){

const sound=document.getElementById("specialAlertSound");
if(sound){
sound.currentTime=0;
sound.play().catch(()=>{});
}

specialLastSound[s] = 1;

}

}else{

// ❌ अब hit reset नहीं होगा
// सिर्फ sound reset होगा (optional)

if(!specialSymbols[s].hit){
specialLastSound[s] = 0;
}

}
}catch(e){
console.log("Special Scan Error",e);
}

}

let interval = 1000;

if(keys.length){
interval = (specialSymbols[keys[0]].interval || 1) * 1000;
}

await new Promise(r=>setTimeout(r,interval));

}

}


async function scannerLoop(){

while(scannerRunning){

// TAB hidden optimisation

continue;
}

try{

await scan();

}catch(e){

console.log("SCAN ERROR:",e);

}

await new Promise(r=>setTimeout(r,10000));

}

}
