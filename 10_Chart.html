<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RVOL Top 10 Dashboard</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:#000;
font-family:Arial;
overflow-y:auto;
}

/* thin scrollbar */
::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-thumb{
background:#F5F047;
border-radius:2px;
}

.chartGrid{

display:grid;

grid-template-columns:1fr 1fr;

grid-auto-rows:50vh;

width:100%;

}

.chartBox{
}

</style>
</head>

<body>

<div class="chartGrid">

<div id="chart1" class="chartBox"></div>
<div id="chart2"></div>

<div id="chart3"></div>
<div id="chart4"></div>

<div id="chart5"></div>
<div id="chart6"></div>

<div id="chart7"></div>
<div id="chart8"></div>

<div id="chart9"></div>
<div id="chart10"></div>

</div>

<script>

function createChart(container,symbol){

new TradingView.widget({

container_id:container,

symbol:"BINANCE:"+symbol+".P",

interval:"1",

autosize:true,

theme:"dark",

style:"1",

locale:"en",

timezone:"Asia/Kolkata",

toolbar_bg:"#000",

enable_publishing:false,

save_image:false,

allow_symbol_change:true,

hide_legend:true,

hide_side_toolbar:false,

withdateranges:false,

details:false,

hotlist:false,

calendar:false,

hide_volume:true,

disabled_features:["volume_overlay"],

studies:["Volume@tv-basicstudies"],

studies_overrides:{
"volume.volume.transparency":0
}

})

}

async function fetchSymbols(){

const res = await fetch("https://fapi.binance.com/fapi/v1/exchangeInfo")
const data = await res.json()

return data.symbols
.filter(s =>
s.contractType==="PERPETUAL" &&
s.quoteAsset==="USDT" &&
s.status==="TRADING"
)
.map(s=>s.symbol)

}

async function getRVOL(symbol){

try{

const res = await fetch(
"https://fapi.binance.com/fapi/v1/klines?symbol="+symbol+"&interval=15m&limit=201"
)

const data = await res.json()

let vols=data.slice(0,200).map(x=>parseFloat(x[5]))
let avg=vols.reduce((a,b)=>a+b,0)/200

let lastVol=parseFloat(data[200][5])

return lastVol/avg

}catch{

return 0

}

}

async function scanRVOL(){

const symbols = await fetchSymbols()

let promises = symbols.map(s =>
getRVOL(s).then(r=>({symbol:s,rvol:r}))
)

let results = await Promise.all(promises)

results.sort((a,b)=>b.rvol-a.rvol)

let top = results.slice(0,10).map(x=>x.symbol)

loadCharts(top)

}

function loadCharts(top){

for(let i=1;i<=10;i++){

document.getElementById("chart"+i).innerHTML=""

createChart("chart"+i,top[i-1])

}

}

scanRVOL()

</script>

</body>
</html>
